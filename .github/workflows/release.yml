name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # Run the test suite before cutting a release (mirrors tests.yml).
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: bun install

      - name: Install Wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@v1
        with:
          version: "47.0.2"

      - name: Verify Wasmtime
        run: wasmtime --version

      - name: Run Tests
        run: bun run test:ci

      - name: Run Fuzz Tests
        run: bun run test:fuzz

      - name: Run Transform Tests
        run: bun run test:transform

      - name: Test Clean Consumer Package
        run: bun run test:consumer

  # Create the GitHub Release with auto-generated notes.
  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        run: |
          # Previous tag (if any) to diff against.
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi

          {
            echo "## Changes"
            echo ""
            echo "$COMMITS"
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
